    <rect width="232" height="110" rx="28" fill="#020611" stroke="#a78bfa" stroke-opacity="0.72" stroke-width="3"/>
    <rect x="28" y="28" width="64" height="64" rx="16" fill="#312e81" fill-opacity="0.28" stroke="#a78bfa" stroke-width="5"/>
    <path d="M44 62h32M60 46v32" stroke="#ddd6fe" stroke-width="9"/>
    <circle cx="152" cy="50" r="13" fill="#c4b5fd"/>
    <path d="M124 86c8-28 48-28 56 0" fill="none" stroke="#c4b5fd" stroke-width="8" stroke-linecap="round"/>

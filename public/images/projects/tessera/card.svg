<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="800" viewBox="0 0 1000 800" role="img" aria-labelledby="title desc">
  <title id="title">Guarded banking agent project card</title>
  <desc id="desc">A dark premium diagram showing a customer signal passing through a guard, a blocked tool call, audit evidence, and human escalation.</desc>
  <defs>
    <radialGradient id="halo" cx="50%" cy="42%" r="66%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.46"/>
      <stop offset="50%" stop-color="#111827" stop-opacity="0.36"/>
      <stop offset="100%" stop-color="#020611" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="7%" y1="4%" x2="97%" y2="96%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="trace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="48%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="danger" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1000" height="800" fill="#020611"/>
  <rect width="1000" height="800" fill="url(#grid)"/>
  <rect width="1000" height="800" fill="url(#halo)"/>
  <circle cx="500" cy="384" r="294" fill="none" stroke="#6366f1" stroke-opacity="0.34" stroke-width="4"/>
  <circle cx="500" cy="384" r="218" fill="none" stroke="#22d3ee" stroke-opacity="0.15" stroke-width="3"/>

  <rect x="90" y="112" width="820" height="520" rx="44" fill="url(#panel)" stroke="#6366f1" stroke-opacity="0.56" stroke-width="3"/>
  <rect x="130" y="152" width="740" height="440" rx="32" fill="#020611" fill-opacity="0.42" stroke="#ffffff" stroke-opacity="0.08"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M274 300H430" stroke="url(#trace)" stroke-width="9" filter="url(#softGlow)"/>
    <path d="M570 300H726" stroke="url(#trace)" stroke-width="9" filter="url(#softGlow)"/>
    <path d="M500 392C500 444 442 458 380 474" stroke="#6366f1" stroke-opacity="0.85" stroke-width="8" stroke-dasharray="15 16"/>
    <path d="M500 392C500 444 564 458 626 474" stroke="url(#danger)" stroke-width="8" stroke-dasharray="15 16"/>
  </g>

  <g transform="translate(154 204)">

    <path d="M54 72h44M54 96h44M54 120h24" stroke="#fed7aa" stroke-width="8"/>
    <circle cx="116" cy="146" r="24" fill="#ef4444"/>
    <path d="M104 146h24" stroke="#fee2e2" stroke-width="8"/>
